<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="author" content="Jace Hunter" />
  <meta name="keywords" content="Timpanogos Baseball Admin" />
  <title>Timpanogos Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="v1/css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-v2-body auth-pending">
  <header class="admin-v2-header">
    <div class="admin-v2-header-inner">
      <a class="admin-v2-brand" href="index.html">
        <img src="images/logo-twolves-wolf.png" alt="Timpanogos Wolves logo" />
        <span>Timpanogos Admin</span>
      </a>
      <nav class="admin-v2-nav" id="mainNav">
        <a href="index.html">Site</a>
      </nav>
    </div>
  </header>

  <div class="carousel" style="display:none"></div>
  <section class="hero" id="heroSection" style="display:none"></section>
  <section class="countdown-section" id="countdownSection" style="display:none"></section>

  <main id="app" class="container admin-v2-app"></main>

  <footer class="admin-v2-footer">
    <p>&copy; Timpanogos High School Baseball</p>
    <a href="index.html">Back to site</a>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    if (!window.location.hash) window.location.hash = '#admin';
  </script>
  <script src="js/flip.min.js"></script>
  <script src="v1/js/carousel.js"></script>
  <script src="v1/js/app.js"></script>
  <script src="js/admin-shell.js"></script>
</body>
</html>
